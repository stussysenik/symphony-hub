# Symphony Multi-Project Configuration
# Location: /Users/s3nik/Desktop/symphony-hub/projects.yml

# Global defaults
defaults:
  max_agents: 2
  polling_interval_ms: 5000
  max_turns: 20
  default_branch: "main"
  workspace_strategy: "worktree"

# Symphony binary location (from cloned repo)
symphony_bin: "/Users/s3nik/Desktop/open-ai-symphony/symphony/elixir/bin/symphony"

# Symphony engine reference (fork + upstream)
engine:
  repo_root: "/Users/s3nik/Desktop/open-ai-symphony/symphony"
  fork_url: "https://github.com/stussysenik/symphony.git"
  upstream_url: "https://github.com/openai/symphony.git"
  expected_branch: "main"

# Base port for dashboards (increments for each project)
base_port: 4001

# Workspace root (where Symphony creates per-issue directories)
workspace_root: "/Users/s3nik/Desktop/symphony-hub/workspaces"

# Logs directory
logs_root: "/Users/s3nik/Desktop/symphony-hub/logs"

# Workflows directory (generated from template)
workflows_dir: "/Users/s3nik/Desktop/symphony-hub/workflows"

# Projects to manage
projects:
  - name: "v0-ipod"
    github_url: "https://github.com/stussysenik/v0-ipod.git"
    repo_root: "/Users/s3nik/Desktop/v0-ipod"
    linear_project_slug: "dabd6fee0112"
    max_agents: 2
    default_branch: "main"
    workspace_strategy: "worktree"
    intake:
      team_key: "CRE"
      default_state: "Triage"
      writable_paths:
        - app
        - components
        - lib
        - public
        - scripts
      restricted_paths:
        - .git
        - node_modules
        - .next
        - dist
        - coverage
      required_checks:
        - npm run validate
        - npm run test
      notes:
        - Keep the work local to the iPod product surface unless the issue explicitly broadens scope.
        - Avoid generated build output and dependency directories.
    assets:
      collect_attachments: true
      scan_project_dirs: true
      capture_screenshots: false
      supported_formats:
        - png
        - jpg
        - gif
        - webp
        - svg
        - figma

  - name: "mymind-clone-web"
    github_url: "https://github.com/stussysenik/mymind-clone-web.git"
    repo_root: "/Users/s3nik/Desktop/mymind-clone-web"
    linear_project_slug: "372637c999d1"
    max_agents: 2
    default_branch: "main"
    workspace_strategy: "worktree"
    workflow_appendix: "workflow-instructions/mymind-clone-web.md"
    intake:
      team_key: "CRE"
      default_state: "Triage"
      writable_paths:
        - apps
        - packages
        - extension
        - extension-firefox
        - docs/features
        - dspy-service
        - experiments
      restricted_paths:
        - .git
        - node_modules
        - .next
        - dist
        - coverage
        - .turbo
      required_checks:
        - bun run lint
        - bun run test
        - bun run check-secrets
      notes:
        - Prefer the narrowest app or package surface possible; do not treat the whole monorepo as fair game.
        - Avoid generated build output, runtime state, and archived evidence unless the issue explicitly targets them.
    assets:
      collect_attachments: true
      scan_project_dirs: true
      capture_screenshots: false
      supported_formats:
        - png
        - jpg
        - gif
        - webp
        - svg
        - figma

  - name: "recap"
    github_url: "https://github.com/stussysenik/recap.git"
    repo_root: "/Users/s3nik/Desktop/recap"
    linear_project_slug: "15ec4aaf8ef1"
    max_agents: 2
    default_branch: "main"
    workspace_strategy: "worktree"
    intake:
      team_key: "CRE"
      default_state: "Triage"
      writable_paths:
        - docs
      restricted_paths:
        - .git
        - node_modules
        - dist
      required_checks: []
      notes:
        - This repo is currently documentation-heavy; broaden scope only after the code surface exists.
    assets:
      collect_attachments: true
      scan_project_dirs: true
      capture_screenshots: false
      supported_formats:
        - png
        - jpg
        - gif
        - webp
        - svg
        - figma
